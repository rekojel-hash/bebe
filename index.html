// ─── Helpers ──────────────────────────────────────────────────────────────────
function nowISO() { return new Date().toISOString(); }
function fmtTime(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}
function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "short" });
}
function fmtDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}h${String(m).padStart(2,"0")}`;
  if (m > 0) return `${m}min${String(s).padStart(2,"0")}s`;
  return `${s}s`;
}
function getAge(birthDate) {
  if (!birthDate) return null;
  const days = Math.floor((Date.now() - new Date(birthDate)) / 86400000);
  if (days < 7)  return `${days} jour${days > 1 ? "s" : ""}`;
  const weeks = Math.floor(days / 7);
  if (weeks < 9) return `${weeks} semaine${weeks > 1 ? "s" : ""}`;
  const months = Math.floor(days / 30.44);
  if (months < 24) return `${months} mois`;
  const years = Math.floor(months / 12);
  const rem = months % 12;
  return rem > 0 ? `${years} an${years>1?"s":""} et ${rem} mois` : `${years} an${years>1?"s":""}`;
}
function isToday(iso) { return new Date(iso).toDateString() === new Date().toDateString(); }

// ─── Timer Hook ───────────────────────────────────────────────────────────────
function useTimer() {
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(null);
  const intRef   = useRef(null);
  const start = () => {
    startRef.current = Date.now() - elapsed * 1000;
    intRef.current = setInterval(() => setElapsed(Math.floor((Date.now() - startRef.current) / 1000)), 1000);
    setRunning(true);
  };
  const stop  = () => { clearInterval(intRef.current); setRunning(false); };
  const reset = () => { stop(); setElapsed(0); };
  useEffect(() => () => clearInterval(intRef.current), []);
  return { running, elapsed, start, stop, reset };
}

function TimerWidget({ onSave }) {
  const { running, elapsed, start, stop, reset } = useTimer();
  const [saved, setSaved] = useState(null);
  const handleStop = () => { stop(); if(elapsed>0){onSave&&onSave(elapsed);setSaved(elapsed);} };
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return (
    <div style={{background:"#060b15",borderRadius:12,padding:"12px 14px",border:`1px solid ${C.borderAccent}`,display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:24,fontWeight:800,color:C.accent,flex:1,fontVariantNumeric:"tabular-nums"}}>{fmt(elapsed)}</div>
      {saved && <div style={{fontSize:12,color:C.accentGreen}}>✓ {fmtDuration(saved)}</div>}
      {!running
        ? <button style={{...S.chip,...S.chipActive}} onClick={start}>▶ Start</button>
        : <><button style={{...S.chip,background:"rgba(255,95,109,0.15)",borderColor:C.accentRed,color:C.accentRed}} onClick={handleStop}>⏹ Stop</button>
           <button style={S.chip} onClick={()=>{reset();setSaved(null);}}>↺</button></>}
    </div>
  );
}

  const [amount,setAmount]=useState("");
  const [side,setSide]=useState("Gauche");
  const [timerVal,setTimerVal]=useState(null);
  const [note,setNote]=useState("");
  const add=()=>{
    setData(d=>({...d,feeds:[...d.feeds,{id:Date.now(),time:nowISO(),type,amount,side:type==="Allaitement"?side:null,duration:timerVal,note}]}));
    setAmount("");setTimerVal(null);setNote("");
  };
  const todayFeeds=data.feeds.filter(f=>isToday(f.time));
  return (
    <div style={S.page}>
      <div style={S.card}>
        <FieldRow label="Type de repas"><ChipGroup options={["Biberon","Allaitement","Mixte","Solides","Eau"]} value={type} onChange={setType}/></FieldRow>
        {(type==="Biberon"||type==="Mixte")&&<FieldRow label="Quantité (ml)"><input style={S.input} type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="Ex : 120"/></FieldRow>}
        {type==="Allaitement"&&<>
          <FieldRow label="Côté"><ChipGroup options={["Gauche","Droit","Les deux"]} value={side} onChange={setSide}/></FieldRow>
          <FieldRow label="Durée"><TimerWidget onSave={s=>setTimerVal(s)}/></FieldRow>
        </>}
        {type==="Solides"&&<FieldRow label="Description"><input style={S.input} value={note} onChange={e=>setNote(e.target.value)} placeholder="Ex : compote pomme, purée carotte…"/></FieldRow>}
        <button style={S.btn} onClick={add}>✅ Enregistrer ce repas</button>
      </div>
      <div style={S.secTitle}>Aujourd'hui · {todayFeeds.length} repas</div>
      {todayFeeds.length===0&&<div style={S.empty}>Aucun repas aujourd'hui</div>}
      {[...todayFeeds].reverse().map(f=>(
        <LogItem key={f.id}
          icon={f.type==="Biberon"?"🍼":f.type==="Allaitement"?"🤱":f.type==="Solides"?"🥣":"💧"}
          title={`${f.type}${f.amount?" · "+f.amount+"ml":""}`}
          sub={`${fmtTime(f.time)}${f.side?" · "+f.side:""}${f.duration?" · "+fmtDuration(f.duration):""}${f.note?" · "+f.note:""}`}
          onDelete={()=>setData(d=>({...d,feeds:d.feeds.filter(x=>x.id!==f.id)}))}/>
      ))}
    </div>
  );
}

// ─── SLEEP ────────────────────────────────────────────────────────────────────
function SleepTab({data,setData}){
  const activeSleep=data.sleeps.find(s=>!s.end);
  const [elapsed,setElapsed]=useState(0);
  useEffect(()=>{
    if(!activeSleep){setElapsed(0);return;}
    const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-new Date(activeSleep.start))/1000)),1000);
    return()=>clearInterval(iv);
  },[activeSleep?.id]);
  const todaySleeps=data.sleeps.filter(s=>s.end&&isToday(s.start));
  const totalSleep=todaySleeps.reduce((a,s)=>a+(new Date(s.end)-new Date(s.start))/1000,0);
  return (
    <div style={S.page}>
      <div style={{...S.cardGlow,textAlign:"center",padding:"28px 16px"}}>
        {activeSleep?(
          <>
            <div style={{fontSize:50}}>💤</div>
            <div style={{fontSize:42,fontWeight:800,color:C.accentPurple,fontVariantNumeric:"tabular-nums",marginTop:6}}>{fmtDuration(elapsed)}</div>
            <div style={{fontSize:13,color:C.textMid,marginTop:6,marginBottom:16}}>En cours depuis {fmtTime(activeSleep.start)}</div>
            <button style={{...S.btn,...S.btnDanger}} onClick={()=>setData(d=>({...d,sleeps:d.sleeps.map(s=>s.id===activeSleep.id?{...s,end:nowISO()}:s)}))}>⏹ Terminer le sommeil</button>
          </>
        ):(
          <>
            <div style={{fontSize:50}}>☀️</div>
            <div style={{fontSize:16,color:C.textMid,marginBottom:16}}>Bébé est éveillé</div>
            <button style={{...S.btn,...S.btnGreen}} onClick={()=>setData(d=>({...d,sleeps:[...d.sleeps,{id:Date.now(),start:nowISO(),end:null}]}))}>🌙 Démarrer le sommeil</button>
          </>
        )}
      </div>
      {todaySleeps.length>0&&<div style={S.card}><div style={{fontSize:12,color:C.textMid,marginBottom:4}}>Sommeil total aujourd'hui</div><div style={{fontSize:30,fontWeight:800,color:C.accent}}>{fmtDuration(totalSleep)}</div></div>}
      <div style={S.secTitle}>Historique</div>
      {data.sleeps.length===0&&<div style={S.empty}>Aucun sommeil enregistré</div>}
      {[...data.sleeps].reverse().slice(0,15).map(s=>(
        <LogItem key={s.id} icon={s.end?"🌙":"💤"}
          title={`${fmtDate(s.start)} · ${fmtTime(s.start)}`}
          sub={s.end?`→ ${fmtTime(s.end)} · ${fmtDuration((new Date(s.end)-new Date(s.start))/1000)}`:"En cours…"}
          color={!s.end?C.accentPurple:undefined}
          onDelete={()=>setData(d=>({...d,sleeps:d.sleeps.filter(x=>x.id!==s.id)}))}/>
      ))}
    </div>
  );
}

// ─── CHECKLIST ────────────────────────────────────────────────────────────────
function ChecklistTab({data,setData}){
  const [view,setView]=useState("daily");
  const items=data.checklist[view]||[];
  const done=items.filter(i=>i.done).length;
  const pct=items.length>0?Math.round(done/items.length*100):0;
  const toggle=id=>setData(d=>({...d,checklist:{...d.checklist,[view]:d.checklist[view].map(i=>i.id===id?{...i,done:!i.done}:i)}}));
  const reset=()=>setData(d=>({...d,checklist:{...d.checklist,[view]:d.checklist[view].map(i=>({...i,done:false}))}}));
  return (
    <div style={S.page}>
      <div style={{display:"flex",gap:7}}>
        {[{k:"daily",l:"☀️ Quotidien"},{k:"weekly",l:"📅 Hebdo"},{k:"milestonesList",l:"🎯 Étapes"}].map(t=>(
          <button key={t.k} style={{...S.chip,flex:1,...(view===t.k?S.chipActive:{})}} onClick={()=>setView(t.k)}>{t.l}</button>
        ))}
      </div>
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:13,color:C.textMid}}>{done}/{items.length} complétés</span>
          <span style={{fontSize:20,fontWeight:800,color:pct===100?C.accentGreen:C.accent}}>{pct}%</span>
        </div>
        <div style={S.progressBar}><div style={{...S.progressFill,width:`${pct}%`,background:pct===100?C.accentGreen:C.accent}}/></div>
        {pct===100&&<div style={{textAlign:"center",marginTop:10,color:C.accentGreen,fontWeight:700}}>🎉 Tout est fait, bravo !</div>}
      </div>
      {items.map(item=>(
        <button key={item.id} style={{...S.logRow,cursor:"pointer",border:`1px solid ${item.done?"rgba(78,203,126,0.25)":C.border}`,background:item.done?"rgba(78,203,126,0.05)":C.surface,width:"100%",textAlign:"left",fontFamily:"inherit"}} onClick={()=>toggle(item.id)}>
          <span style={{...S.logIcon}}>{item.icon}</span>
          <span style={{flex:1,fontSize:13,fontWeight:600,color:item.done?C.textDim:C.text,textDecoration:item.done?"line-through":"none"}}>{item.label}</span>
          <span style={{fontSize:18}}>{item.done?"✅":"⬜"}</span>
        </button>
      ))}
      <button style={S.btnOutline} onClick={reset}>🔄 Tout réinitialiser</button>
    </div>
  );
}

// ─── SAVE/LOAD ────────────────────────────────────────────────────────────────
function SaveTab({data,setData}){
  const [msg,setMsg]=useState(null);
  const fileRef=useRef();
  const showMsg=(type,text)=>{setMsg({type,text});setTimeout(()=>setMsg(null),3500);};

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`bebelog_${data.babyName.replace(/\s/g,"_")}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showMsg("success","✅ Sauvegarde téléchargée !");
  };
  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const parsed=JSON.parse(ev.target.result);setData(parsed);showMsg("success","✅ Données chargées !");}
      catch{showMsg("error","❌ Fichier invalide.");}
    };
    reader.readAsText(file);e.target.value="";
  };
  const resetData=()=>{
    if(window.confirm("Effacer TOUTES les données ? Cette action est irréversible."))
      {setData(INITIAL);showMsg("success","✅ Données réinitialisées.");}
  };
  const stats=[["🍼 Repas",data.feeds.length],["😴 Sommeils",data.sleeps.length],["💩 Couches",data.diapers.length],["⚖️ Pesées",data.weights.length],["🌡️ Températures",data.temps.length],["💊 Médicaments",(data.medicines||[]).length],["💉 Vaccins",(data.vaccines||[]).length],["⭐ Étapes",(data.milestones||[]).length],["🧸 Activités",(data.activities||[]).length],["📝 Notes",data.notes.length]];
  return (
    <div style={S.page}>
      <div style={S.secTitle}>Données enregistrées</div>
      <div style={{...S.card,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {stats.map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
            <span style={{color:C.textMid}}>{l}</span>
            <span style={{fontWeight:700,color:C.accent}}>{v}</span>
          </div>
        ))}
      </div>
      {msg&&<div style={msg.type==="success"?S.success:S.alert}>{msg.text}</div>}
      <div style={S.secTitle}>Sauvegarder</div>
      <div style={S.card}>
        <p style={{fontSize:13,color:C.textMid,margin:"0 0 10px"}}>Exportez vos données dans un fichier JSON. Sauvegardez-le sur Google Drive, iCloud, email…</p>
        <button style={S.btn} onClick={exportData}>📥 Télécharger la sauvegarde (.json)</button>
      </div>
      <div style={S.secTitle}>Charger une sauvegarde</div>
      <div style={S.card}>
        <p style={{fontSize:13,color:C.textMid,margin:"0 0 10px"}}>Rechargez une sauvegarde précédente. Les données actuelles seront remplacées.</p>
        <input type="file" accept=".json" ref={fileRef} style={{display:"none"}} onChange={importData}/>
        <button style={{...S.btn,...S.btnOrange}} onClick={()=>fileRef.current.click()}>📂 Charger un fichier (.json)</button>
      </div>
      <div style={S.secTitle}>Réinitialiser</div>
      <div style={S.card}>
        <p style={{fontSize:13,color:C.textMid,margin:"0 0 10px"}}>⚠️ Efface toutes les données définitivement.</p>
        <button style={{...S.btn,...S.btnDanger}} onClick={resetData}>🗑️ Réinitialiser toutes les données</button>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
const TABS = [
  { label:"🏠", full:"Accueil",  component:(d,s)=><HomeTab data={d} setData={s}/> },
  { label:"🍼", full:"Repas",    component:(d,s)=><FeedTab data={d} setData={s}/> },
  { label:"🌙", full:"Sommeil",  component:(d,s)=><SleepTab data={d} setData={s}/> },
  { label:"❤️", full:"Santé",    component:(d,s)=><HealthTab data={d} setData={s}/> },
  { label:"🌱", full:"Éveil",    component:(d,s)=><DevTab data={d} setData={s}/> },
  { label:"✅", full:"Routine",  component:(d,s)=><ChecklistTab data={d} setData={s}/> },
  { label:"💾", full:"Données",  component:(d,s)=><SaveTab data={d} setData={s}/> },
  { label:"💛", full:"Soutien",  component:()=><SupportTab/> },
];

function App() {
  const [tab,  setTab]  = useState(0);
  // Load from localStorage on init
  const [data, setData] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : INITIAL;
    } catch { return INITIAL; }
  });

  // Auto-save to localStorage on every change
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.warn("Storage full", e); }
  }, [data]);

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.headerTop}>
          <div style={S.headerLogo}>👶</div>
          <div>
            <div style={S.headerTitle}>BébéLog</div>
            <div style={S.headerSub}>Votre compagnon pour les premiers mois</div>
          </div>
          {data.birthDate&&(
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:10,color:C.textDim}}>Âge</div>
              <div style={{fontSize:12,fontWeight:700,color:C.accent}}>{getAge(data.birthDate)}</div>
            </div>
          )}
        </div>
        <div style={S.navRow}>
          {TABS.map((t,i)=>(
            <button key={i} style={{...S.navBtn,...(tab===i?S.navBtnActive:{})}} onClick={()=>setTab(i)}>
              {t.label} {t.full}
            </button>
          ))}
        </div>
      </div>
      <div style={S.scroll}>
        {TABS[tab].component(data, setData)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// ─── PWA: Service Worker Registration ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}

// ─── PWA: Install Banner ──────────────────────────────────────────────────────
let deferredPrompt = null;
const banner    = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('install-dismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 3s
  setTimeout(() => banner.classList.add('show'), 3000);
});

installBtn.addEventListener('click', async () => {
  banner.classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('Install outcome:', outcome);
    deferredPrompt = null;
  }
});

dismissBtn.addEventListener('click', () => {
  banner.classList.remove('show');
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  console.log('BébéLog installed!');
  banner.classList.remove('show');
});

// ─── Splash Screen ────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash) {
      splash.classList.add('fade');
      setTimeout(() => splash.remove(), 400);
    }
  }, 1200);
});
</script>
</body>
</html>
